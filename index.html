<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test proxy — Données S&P 500</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --text: #e6e6e6;
    --accent: #4f8cff;
    --ok: #3ecf8e;
    --err: #ff5c5c;
    --border: #2a2e38;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.subtitle { color: #999; margin-top: 0; font-size: 0.9rem; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 20px 0;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:hover { opacity: 0.85; }
  .status {
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 0.9rem;
    white-space: pre-wrap;
  }
  .status.ok { background: rgba(62,207,142,0.1); border: 1px solid var(--ok); color: var(--ok); }
  .status.err { background: rgba(255,92,92,0.1); border: 1px solid var(--err); color: var(--err); }
  .status.pending { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #aaa; }
  pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    font-size: 0.8rem;
    max-height: 400px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-top: 10px;
  }
  th, td {
    border-bottom: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
  }
  th:first-child, td:first-child { text-align: left; }
</style>
</head>
<body>

<h1>Test du proxy CORS — données S&amp;P 500</h1>
<p class="subtitle">Page de test isolée avant intégration dans l'application finale. Vérifie que /api/prices répond correctement une fois déployé sur Cloudflare Pages.</p>

<div class="controls">
  <button onclick="testTicker('^spx')">Tester ^spx (S&P 500)</button>
  <button onclick="testTicker('spy.us')">Tester SPY</button>
  <button onclick="testTicker('rsp.us')">Tester RSP</button>
  <button onclick="testTicker('^vix')">Tester VIX</button>
</div>

<div id="status" class="status pending">Aucun test lancé pour l'instant.</div>

<div id="table-container"></div>

<h3>Réponse JSON brute (10 premières lignes)</h3>
<pre id="raw-output">—</pre>

<script>
async function testTicker(ticker) {
  const statusEl = document.getElementById('status');
  const rawEl = document.getElementById('raw-output');
  const tableEl = document.getElementById('table-container');

  statusEl.className = 'status pending';
  statusEl.textContent = `Appel de /api/prices?ticker=${ticker}&interval=w ...`;
  rawEl.textContent = '—';
  tableEl.innerHTML = '';

  try {
    const res = await fetch(`/api/prices?ticker=${encodeURIComponent(ticker)}&interval=w`);
    const json = await res.json();

    if (!res.ok || json.error) {
      statusEl.className = 'status err';
      statusEl.textContent = `Échec (HTTP ${res.status})\n${JSON.stringify(json, null, 2)}`;
      rawEl.textContent = JSON.stringify(json, null, 2);
      return;
    }

    statusEl.className = 'status ok';
    statusEl.textContent = `Succès — source: ${json.source} — ${json.count} bougies récupérées pour ${json.ticker}`;

    rawEl.textContent = JSON.stringify(json.data.slice(0, 10), null, 2);

    // Affichage tabulaire des 10 dernières bougies
    const rows = json.data.slice(-10);
    let html = '<table><thead><tr><th>Date</th><th>Open</th><th>High</th><th>Low</th><th>Close</th><th>Volume</th></tr></thead><tbody>';
    rows.forEach(r => {
      html += `<tr><td>${r.date}</td><td>${fmt(r.open)}</td><td>${fmt(r.high)}</td><td>${fmt(r.low)}</td><td>${fmt(r.close)}</td><td>${r.volume ?? '—'}</td></tr>`;
    });
    html += '</tbody></table>';
    tableEl.innerHTML = html;

  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = `Erreur réseau ou parsing : ${e.message}`;
  }
}

function fmt(n) {
  return typeof n === 'number' ? n.toFixed(2) : '—';
}
</script>

</body>
</html>
